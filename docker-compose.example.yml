name: pulliku
services:
  pulliku:
    image: ghcr.io/maroishiku/pulliku:latest
    container_name: pulliku
    restart: unless-stopped
    ports:
      - "8180:8080"
    environment:
      TZ: Europe/Berlin
      ISHIKU_APP_URL: http://localhost:8180
      ISHIKU_BASE_PATH: /
      ISHIKU_DATA_DIR: /data
      DOWNLOAD_DIR: /downloads
      ISHIKU_SETUP_SECRET_FILE: /run/secrets/ishiku_setup_secret
      ISHIKU_LOG_LEVEL: info
      SESSION_DAYS: 14
    volumes:
      - ./data:/data
      - ./downloads:/downloads
    secrets:
      - ishiku_setup_secret
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

secrets:
  ishiku_setup_secret:
    file: ./secrets/setup_secret.txt
